<svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220" fill="none">
  <!-- Pattern oficial Affida — símbolo de mãos entrelaçadas em grid staggered, conforme manual pg. 23. -->
  <defs>
    <symbol id="affidaMark" viewBox="0 0 120 44" overflow="visible">
      <path d="M10 22 C 14 9, 34 8, 46 16 C 54 22, 66 22, 74 16 C 86 8, 106 9, 110 22"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M10 22 C 14 35, 30 36, 42 28 C 50 22, 62 22, 70 28 C 82 36, 106 35, 110 22"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    </symbol>
  </defs>
  <g opacity="0.08" color="#173F65">
    <use href="#affidaMark" x="-20" y="18" width="90" height="33"/>
    <use href="#affidaMark" x="100" y="18" width="90" height="33"/>
    <use href="#affidaMark" x="220" y="18" width="90" height="33"/>

    <use href="#affidaMark" x="40" y="80" width="90" height="33"/>
    <use href="#affidaMark" x="160" y="80" width="90" height="33"/>
    <use href="#affidaMark" x="280" y="80" width="90" height="33"/>

    <use href="#affidaMark" x="-20" y="142" width="90" height="33"/>
    <use href="#affidaMark" x="100" y="142" width="90" height="33"/>
    <use href="#affidaMark" x="220" y="142" width="90" height="33"/>
  </g>
</svg>
